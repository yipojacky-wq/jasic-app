name: JASIC Public Preview Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run smoke:public-preview

