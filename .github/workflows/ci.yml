name: JASIC CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run doctor:data-sources
      - run: npm run doctor:live-readiness
      - run: npm run doctor:ai-governance
      - run: npm run doctor:supabase
      - run: npm run typecheck
      - run: npm run typecheck:edge
      - run: npm test
      - run: npm run build:web
