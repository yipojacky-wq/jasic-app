name: JASIC Market Data Pipeline

on:
  workflow_dispatch:
  schedule:
    # 17:30 Asia/Taipei, Monday-Friday. The function uses source dates,
    # so holidays and delayed publication do not create false trading days.
    - cron: "30 9 * * 1-5"

jobs:
  ingest-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"
          test -n "$CRON_SECRET"

      - name: Run daily market data, score and report pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run pipeline:daily
