name: Deploy Web Preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run doctor:data-sources
      - run: npm run doctor:live-readiness
      - run: npm run typecheck
      - run: npm run typecheck:edge
      - run: npm test
      - run: npm run build:web:github-pages
        env:
          EXPO_PUBLIC_DEMO_MODE: "false"
          EXPO_PUBLIC_SUPABASE_URL: "https://hxftprkavdearldqdwps.supabase.co"
          EXPO_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_B4z1Thco3zNeDM60UV7hug_Ua9Gydp9"
          JASIC_AI_MODE: "rule_based"
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
